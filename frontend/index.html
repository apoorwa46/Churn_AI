<!DOCTYPE html>
<html>
<head>
    <title>Churn Intelligence System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🚀 ChurnAI</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="https://github.com/apoorwa46/Churn_AI" target="_blank">GitHub</a>
    </div>
</div>
<!-- HERO SECTION -->
<div class="hero">
    <h1>Customer Churn Intelligence System</h1>
    <p>
        Predict customer churn using AI, identify high-risk users, and take
        data-driven actions with smart retention strategies.
    </p>
</div>
<!-- MAIN -->
<div class="main">
    

    <!-- LEFT FORM -->
    <div class="card form-card">

        
        <h2>Customer Input</h2>

        <div class="input-group">
            <input id="tenure" type="number" required>
            <label>Tenure (months)</label>
        </div>

        <div class="input-group">
            <input id="monthly" type="number" required>
            <label>Monthly Charges</label>
        </div>

        <div class="input-group">
            <input id="total" type="number" required>
            <label>Total Charges</label>
        </div>

        <!-- Additional Features -->

<div class="input-group">
    <select id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>
</div>

<div class="input-group">
    <select id="partner">
        <option value="Yes">Partner</option>
        <option value="No">No Partner</option>
    </select>
</div>

<div class="input-group">
    <select id="dependents">
        <option value="Yes">Dependents</option>
        <option value="No">No Dependents</option>
    </select>
</div>

<div class="input-group">
    <select id="phone">
        <option value="Yes">Phone Service</option>
        <option value="No">No Phone</option>
    </select>
</div>

<div class="input-group">
    <select id="billing">
        <option value="Yes">Paperless Billing</option>
        <option value="No">No Paperless Billing</option>
    </select>
</div>

<div class="input-group">
    <select id="payment">
        <option value="Electronic check">Electronic Check</option>
        <option value="Mailed check">Mailed Check</option>
        <option value="Credit card (automatic)">Credit Card</option>
    </select>
</div>

<div class="input-group">
    <select id="contract">
        <option value="Month-to-month">Month-to-month</option>
        <option value="One year">One year</option>
        <option value="Two year">Two year</option>
    </select>
</div>

        <button onclick="predict()">Analyze Customer</button>
    </div>

    <!-- RIGHT RESULTS -->
    <div class="card result-card">
        <h2>📊 Prediction Dashboard</h2>

        <div id="resultBox">
            <p class="placeholder">Enter data to see insights</p>
        </div>

        <canvas id="chart"></canvas>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
